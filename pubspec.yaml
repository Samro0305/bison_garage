name: bison_garage
description: "BISON GARAGE - Android Garage Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.5.1
  
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  path_provider: ^2.1.5

  pdf: ^3.11.3
  printing: ^5.14.2

  share_plus: ^11.0.0

  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

