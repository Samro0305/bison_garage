name: bison_garage
description: "BISON GARAGE - Android Garage Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  firebase_core: ^4.1.0
  cloud_firestore: ^6.0.0

  path_provider: ^2.1.5

  pdf: ^3.11.3
  printing: ^5.14.2

  share_plus: ^11.0.0

  intl: ^0.20.2

  uuid: ^4.5.1

  image_picker: ^1.1.2

  file_picker: ^10.3.2

  excel: ^4.0.6

  fl_chart: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

  flutter_native_splash: ^2.4.4

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/bison_bull_splash.png

  android: true
  ios: false

  android_12:
    color: "#FFFFFF"
    image: assets/images/bison_bull_splash.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/